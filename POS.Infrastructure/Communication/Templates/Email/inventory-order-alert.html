<div class="card">
    <table style="width: 100%; border-spacing: 0;">
        <tr>
            <td style="padding-bottom: 8px; color: #64748b; font-size: 12px; font-weight: 700; text-transform: uppercase;">Tracking Number</td>
            <td style="padding-bottom: 8px; color: #0f172a; font-size: 14px; font-weight: 700; text-align: right;">{{OrderNumber}}</td>
        </tr>
        <tr>
            <td style="padding: 8px 0; color: #64748b; font-size: 12px; font-weight: 700; text-transform: uppercase;">Current Status</td>
            <td style="padding: 8px 0; text-align: right;"><span class="badge badge-blue">{{Status}}</span></td>
        </tr>
        <tr>
            <td style="padding: 8px 0; color: #64748b; font-size: 12px; font-weight: 700; text-transform: uppercase;">From</td>
            <td style="padding: 8px 0; color: #334155; font-size: 14px; font-weight: 600; text-align: right;">{{SourceStore}}</td>
        </tr>
        <tr>
            <td style="padding-top: 8px; color: #64748b; font-size: 12px; font-weight: 700; text-transform: uppercase;">To</td>
            <td style="padding-top: 8px; color: #334155; font-size: 14px; font-weight: 600; text-align: right;">{{DestinationStore}}</td>
        </tr>
    </table>
</div>

<h3 style="color: #0f172a; font-size: 18px; margin: 32px 0 16px;">Shipment Contents</h3>
<table style="width: 100%; border-collapse: collapse; background-color: #ffffff; border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden;">
    <thead>
        <tr style="background-color: #f8fafc; border-bottom: 1px solid #e2e8f0;">
            <th style="padding: 12px 16px; text-align: left; color: #64748b; font-size: 11px; font-weight: 700; text-transform: uppercase;">Item / Variant</th>
            <th style="padding: 12px 16px; text-align: center; color: #64748b; font-size: 11px; font-weight: 700; text-transform: uppercase;">Qty</th>
        </tr>
    </thead>
    <tbody>
        {{ItemsHtml}}
    </tbody>
</table>
