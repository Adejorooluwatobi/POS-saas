<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{Subject}}</title>
    <style>
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #f1f5f9; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
        .wrapper { width: 100%; table-layout: fixed; background-color: #f1f5f9; padding-bottom: 40px; }
        .container { max-width: 600px; margin: 0 auto; background-color: #ffffff; border-radius: 16px; overflow: hidden; margin-top: 40px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
        .header { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); padding: 40px 32px; text-align: center; }
        .header h1 { color: #f8fafc; margin: 0; font-size: 28px; font-weight: 800; letter-spacing: -0.025em; text-transform: uppercase; }
        .header p { color: #94a3b8; margin: 8px 0 0; font-size: 14px; font-weight: 500; }
        .content { padding: 48px 40px; color: #334155; line-height: 1.7; }
        .content h2 { color: #0f172a; margin-top: 0; font-size: 22px; font-weight: 700; }
        .card { background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 24px; margin: 24px 0; }
        .btn { display: inline-block; padding: 14px 32px; background-color: #4f46e5; color: #ffffff !important; text-decoration: none; border-radius: 9999px; font-weight: 700; font-size: 14px; text-align: center; transition: background-color 0.2s; }
        .footer { padding: 32px; text-align: center; color: #64748b; font-size: 13px; border-top: 1px solid #f1f5f9; }
        .footer p { margin: 4px 0; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 9999px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .badge-success { background-color: #dcfce7; color: #166534; }
        .badge-blue { background-color: #dbeafe; color: #1e40af; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <div class="header">
                <h1>RetailOS</h1>
                <p>Enterprise Inventory Network</p>
            </div>
            <div class="content">
                <h2 style="margin-bottom: 16px;">{{Title}}</h2>
                <p style="margin-bottom: 24px; font-size: 16px;">{{Message}}</p>
                
                {{Content}}

                <div style="text-align: center; margin-top: 32px;">
                    <a href="{{ActionUrl}}" class="btn">{{ActionText}}</a>
                </div>
            </div>
            <div class="footer">
                <p>&copy; {{Year}} RetailOS Cloud Services. All rights reserved.</p>
                <p>Ensuring data integrity across your retail enterprise.</p>
            </div>
        </div>
    </div>
</body>
</html>
